<html>

<head>
    <title>Ecommerce website</title>
    <link rel="stylesheet" href="adminstyle.css">
</head>

<body>
    <header>
        <h1>"Ecommerce App-"</h1>
        <p>"Welcome Admin"</p>
        <a href="http://localhost:8000/logout">Logout</a>
        <nav>
            <button onclick="showSection('allproducts'); fetchData()">All Products</button>
            <button onclick="showSection('addproduct')">Add Product</button>
            <button onclick="showSection('getbyid')">Get Product by ID</button>
            <button onclick="showSection('updateproduct')">Update Product</button>
        </nav>
    </header>
    <section id="addproduct">
        <h2>Add New Product</h2>

        <p id="form-msg"></p>

        <form id="addProductForm">

            <div class="form-group">
                <label for="prod-name">Product Name</label>
                <input type="text" id="prod-name" name="name" placeholder="e.g. Puprle Summer Dress" required>
            </div>

            <div class="form-group">
                <label for="prod-description">Description</label>
                <textarea id="prod-description" name="description" placeholder="Describe the product..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label for="prod-price">Price ($)</label>
                <input type="number" id="prod-price" name="price" placeholder="0.00" min="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="prod-stock">Stock</label>
                <input type="number" id="prod-stock" name="stock" placeholder="0" min="0" required>
            </div>

            <div class="form-group">
                <label for="prod-image">Image URL <span class="optional">(optional)</span></label>
                <input type="url" id="prod-image" name="image_url" placeholder="https://example.com/image.jpg">
            </div>

            <button type="submit">Add Product</button>

        </form>
    </section>

    <section id="allproducts">
        <div id="productsList"></div>
    </section>
    <button onclick="logout()">Logout</button>
    <script src="adminapp.js"></script>
    <footer>
        <p>&copy; 2026 ecommerceapp.com</p>
        <a href="instagram.com">instagram</a>
    </footer>
</body>


</html>
